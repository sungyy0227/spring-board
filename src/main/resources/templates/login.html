<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | Spring Board</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body class="auth-page">
<main class="auth-shell">
    <a class="auth-brand" th:href="@{/}" aria-label="Spring Board 홈">
        <span class="auth-brand-mark" aria-hidden="true"></span>
        <span>Spring Board</span>
    </a>

    <section class="auth-card" aria-labelledby="login-title">
        <div class="auth-heading">
            <span class="auth-eyebrow">WELCOME BACK</span>
            <h1 id="login-title">로그인</h1>
            <p>계정에 로그인하고 새로운 이야기를 확인해 보세요.</p>
        </div>

        <div class="auth-alert auth-alert-error" th:if="${param.error}">
            <span th:if="${param.error[0] == 'withdrawn'}">탈퇴한 회원입니다. 로그인이 불가능합니다.</span>
            <span th:unless="${param.error[0] == 'withdrawn'}">아이디 또는 비밀번호가 올바르지 않습니다.</span>
        </div>

        <div class="auth-alert auth-alert-success"
             th:if="${successMessage}"
             th:text="${successMessage}">회원가입이 완료되었습니다.</div>

        <form class="auth-form" th:action="@{/login}" method="post">
            <label class="form-field" for="login-id">
                <span>아이디</span>
                <input id="login-id"
                       type="text"
                       name="loginId"
                       placeholder="아이디를 입력하세요"
                       autocomplete="username"
                       required>
            </label>

            <label class="form-field" for="login-password">
                <span>비밀번호</span>
                <input id="login-password"
                       type="password"
                       name="password"
                       placeholder="비밀번호를 입력하세요"
                       autocomplete="current-password"
                       required>
            </label>

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <button class="auth-primary-button" type="submit">로그인</button>
        </form>

        <p class="auth-switch">
            아직 계정이 없으신가요?
            <a th:href="@{/login/signup}">회원가입</a>
        </p>
    </section>
</main>
</body>
</html>
