<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<link rel="stylesheet" th:href="@{/css/login.css}">
<head>
    <title>로그인</title>
</head>
<body>
    <form th:action="@{/login}" method="post">
        <input type="text" name="loginId" placeholder="아이디"><br><br>
        <input type="password" name="password" placeholder="비밀번호"><br><br>
        <button type="submit">로그인</button>
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">
    </form>
    <div th:if="${param.error}">
        <h3 th:if="${param.error[0] == 'withdrawn'}" style="color: red">탈퇴한 회원입니다. 로그인이 불가능합니다.</h3>
        <h3 th:unless="${param.error[0] == 'withdrawn'}" style="color: red">아이디 또는 비밀번호가 올바르지 않습니다.</h3>
    </div>
<a th:href="@{/login/signup}">회원가입</a>
        <div th:if="${successMessage}" th:text="${successMessage}" style="color:green;"></div>
</body>
</html>
