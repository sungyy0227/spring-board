<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<!--<link rel="stylesheet" th:href="@{/css/postView.css}">-->
<head>
    <title th:text="${post.title}">게시물 수정</title>
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>
<body>
<form th:action="@{/posts/{id}(id=${post.id})}" method="post" enctype="multipart/form-data" id="post-form">
    <input type="hidden" name="_method" value="patch">
    <table>
        <tr>
            <td><input name="title" th:value="${post.title}"></td>
            <td>
                <input th:if="${post.member == null}" name="poster" th:value="${post.poster}">
                <span th:if="${post.member != null}" th:text="${post.poster} + ' 님'"></span>
            </td>
        </tr>

        <tr>
            <td colspan="2">
                <div id="editor"></div>
                <textarea id="content" name="content" hidden th:text="${post.content}"></textarea>
            </td>
        </tr>

    </table>
    <button type="submit">수정하기</button>
    <input type="hidden"
           th:name="${_csrf.parameterName}"
           th:value="${_csrf.token}">
</form>
<a th:href="@{/}">글목록</a>

<script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
<script>
    const contentField = document.querySelector('#content');
    const postForm = document.querySelector('#post-form');
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    const uploadedImageIds = [];

    const editor = new toastui.Editor({
        el: document.querySelector('#editor'),
        height: '500px',
        initialEditType: 'wysiwyg',
        previewStyle: 'vertical',
        initialValue: contentField.value || '',
        usageStatistics: false,
        hooks: {
            addImageBlobHook: async function (blob, callback) {
                const formData = new FormData();
                formData.append('imageFile', blob, blob.name || 'image.png');

                const response = await fetch('/editor/images', {
                    method: 'POST',
                    headers: {
                        [csrfHeader]: csrfToken
                    },
                    body: formData
                });

                if (!response.ok) {
                    alert('이미지 업로드에 실패했습니다.');
                    return;
                }

                const result = await response.json();
                uploadedImageIds.push({
                    id: result.imageId,
                    url: result.url
                });

                callback(result.url, blob.name || 'image');
            }
        }
    });

    editor.setHTML(contentField.value || '');

    postForm.addEventListener('submit', function () {
        contentField.value = editor.getHTML();

        document.querySelectorAll('input[name="imageIds"]').forEach(input => input.remove());

        uploadedImageIds
            .filter(image => contentField.value.includes(image.url))
            .forEach(image => {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'imageIds';
                input.value = image.id;
                postForm.appendChild(input);
            });
    });
</script>
</body>
</html>
