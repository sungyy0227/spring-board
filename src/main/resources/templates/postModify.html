<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${post.title + ' 수정 - Spring Board'}">게시물 수정 | Spring Board</title>
    <link rel="stylesheet" th:href="@{/css/postWrite.css}">
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>
<body class="write-page">
<main class="write-shell">
    <header class="write-header">
        <a class="write-brand" th:href="@{/}" aria-label="Spring Board 홈">
            <span class="write-brand-mark" aria-hidden="true"></span>
            <span>Spring Board</span>
        </a>
        <a class="secondary-button" th:href="@{/posts/{id}(id=${post.id})}">게시글로 돌아가기</a>
    </header>

    <section class="write-card" aria-labelledby="modify-title">
        <div class="write-heading">
            <span class="write-eyebrow">EDIT POST</span>
            <h1 id="modify-title">게시글 수정</h1>
            <p>작성한 내용을 확인하고 필요한 부분을 수정해 보세요.</p>
        </div>

        <form id="post-form"
              class="write-form"
              th:action="@{/posts/{id}(id=${post.id})}"
              th:object="${postDto}"
              method="post"
              enctype="multipart/form-data">
            <input type="hidden" name="_method" value="patch">

            <label class="write-field" for="modify-title-input">
                <span>제목</span>
                <input id="modify-title-input"
                       type="text"
                       name="title"
                       th:value="${post.title}"
                       placeholder="제목을 입력하세요">
            </label>
            <div class="field-error"
                 th:if="${#fields.hasErrors('title')}"
                 th:errors="*{title}">제목 오류</div>

            <div class="write-meta">
                <label class="write-field" for="modify-poster" th:if="${post.member == null}">
                    <span>작성자</span>
                    <input id="modify-poster"
                           type="text"
                           name="poster"
                           th:value="${post.poster}"
                           placeholder="작성자 이름을 입력하세요">
                </label>

                <div class="write-field" th:if="${post.member != null}">
                    <span>작성자</span>
                    <div class="member-writer" th:text="|${post.poster} 님|">회원 님</div>
                    <input type="hidden" name="poster" th:value="${post.poster}">
                </div>
            </div>
            <div class="field-error"
                 th:if="${#fields.hasErrors('poster')}"
                 th:errors="*{poster}">작성자 오류</div>

            <div class="editor-field">
                <span>내용</span>
                <div id="editor"></div>
                <textarea id="content" name="content" hidden th:text="${post.content}"></textarea>
            </div>
            <div class="field-error"
                 th:if="${#fields.hasErrors('content')}"
                 th:errors="*{content}">내용 오류</div>

            <p class="write-error"
               th:if="${errorMessage}"
               th:text="${errorMessage}">게시글 수정 오류</p>

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div class="write-actions">
                <a class="secondary-button" th:href="@{/posts/{id}(id=${post.id})}">취소</a>
                <button class="primary-button" type="submit">수정 완료</button>
            </div>
        </form>
    </section>
</main>

<script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
<script>
    const contentField = document.querySelector('#content');
    const postForm = document.querySelector('#post-form');
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    const uploadedImageIds = [];

    const editor = new toastui.Editor({
        el: document.querySelector('#editor'),
        height: '500px',
        initialEditType: 'wysiwyg',
        previewStyle: 'vertical',
        initialValue: contentField.value || '',
        usageStatistics: false,
        hooks: {
            addImageBlobHook: async function (blob, callback) {
                const formData = new FormData();
                formData.append('imageFile', blob, blob.name || 'image.png');

                try {
                    const response = await fetch('/editor/images', {
                        method: 'POST',
                        headers: {
                            [csrfHeader]: csrfToken
                        },
                        body: formData
                    });

                    const result = await response.json();

                    if (!response.ok) {
                        alert(result.message || '이미지 업로드에 실패했습니다.');
                        return;
                    }

                    uploadedImageIds.push({
                        id: result.imageId,
                        url: result.url
                    });

                    callback(result.url, blob.name || 'image');
                } catch (error) {
                    console.error('이미지 업로드 오류:', error);
                    alert('이미지 업로드 중 오류가 발생했습니다.');
                }
            }
        }
    });

    editor.setHTML(contentField.value || '');

    postForm.addEventListener('submit', function () {
        const markdown = editor.getMarkdown().trim();
        contentField.value = markdown === '' ? '' : editor.getHTML();

        document.querySelectorAll('input[name="imageIds"]').forEach(input => input.remove());

        uploadedImageIds
            .filter(image => contentField.value.includes(image.url))
            .forEach(image => {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'imageIds';
                input.value = image.id;
                postForm.appendChild(input);
            });
    });
</script>
</body>
</html>
