<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<link rel="stylesheet" th:href="@{/css/postView.css}">
<head>
    <title th:text="${post.title}">게시물 상세 페이지</title>
</head>
<body>
<div class="content-box">
    <div class="head">
        <h2 th:text="${post.title}">제목</h2>

        <div class="meta">
            <span th:text="${post.poster}">작성자</span>
            <small th:if="${post.member != null and post.member.withdrawn}"
                   style="color: #888; font-size: 12px;">
                (탈퇴)
            </small>&ensp;
            <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
            <span class="viewCount">조회수: [[${post.viewCount}]]</span>
        </div>
    </div>
    <hr>
    <div class="article">
        <div th:utext="${post.content}"></div>
    </div>
</div>

<div class="post-actions">
    <form th:action="@{/}" method="get">
        <button type="submit">글목록</button>
    </form>

    <div class="deleteAndModify">
        <div th:if="${post.member != null and loginMember != null and post.member.id == loginMember.id}">
            <form th:action="@{/posts/{id}/edit(id=${post.id})}" method="post">
                <button type="submit">글수정</button>
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">
            </form>

            <form th:action="@{/posts/{id}(id=${post.id})}" method="post">
                <input type="hidden" name="_method" value="delete">
                <button type="submit">글삭제</button>
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">
            </form>
        </div>

        <div th:if="${post.member == null}">
            <form th:action="@{/posts/{id}/edit(id=${post.id})}" method="post">
                <input type="password" name="password" placeholder="비밀번호 입력">
                <button type="submit">글수정</button>
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">
            </form>

            <form th:action="@{/posts/{id}(id=${post.id})}" method="post">
                <input type="hidden" name="_method" value="delete">
                <input type="password" name="password" placeholder="비밀번호 입력">
                <button type="submit">글삭제</button>
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">
            </form>
        </div>
    </div>
</div>

<table>
    <colgroup>
        <col style="width: 15%;">
        <col style="width: 80%;">
        <col style="width: 5%;">
    </colgroup>
    <tr th:each="comment: ${post.comments}">
        <td>
            <span th:text="${comment.commenter}">작성자</span>
            <small th:if="${comment.member != null and comment.member.withdrawn}"
                   style="color: #888; font-size: 12px; white-space: nowrap;">
                (탈퇴)
            </small>
        </td>
        
        <td th:text="${comment.commentContent}">내용</td>
        <td>
            <form th:action="@{/posts/{postId}/comments/{commentId}(postId=${post.id}, commentId=${comment.id})}" method="post">
                <input type="hidden" name="_method" value="delete">
                <input th:if="${comment.member == null}" type="password" placeholder="비밀번호" name="guestRawPassword">
                <button type="submit">X</button>
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">
            </form>
        </td>
    </tr>
</table>

<div class="comment-actions">
    <form th:action="@{/posts/{id}/comments(id=${post.id})}" method="post">
        <input th:if="${loginMember == null}" name="commenter" placeholder="작성자">
        <span th:if="${loginMember != null}" th:text="${loginMember.nickname} + ' 님'"></span>
        <input name="commentContent" placeholder="댓글">
        <input type="password" th:if="${loginMember == null}" name="guestRawPassword" placeholder="비밀번호">
        <button type="submit">댓글등록</button>
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">
    </form>
</div>
</body>
</html>
