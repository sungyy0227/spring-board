<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${post.title + ' - Spring Board'}">게시물 상세 | Spring Board</title>
    <link rel="stylesheet" th:href="@{/css/postView.css}">
</head>
<body class="post-page">
<main class="post-shell">
    <header class="post-site-header">
        <a class="post-brand" th:href="@{/}" aria-label="Spring Board 홈">
            <span class="post-brand-mark" aria-hidden="true"></span>
            <span>Spring Board</span>
        </a>
        <nav class="post-header-actions" aria-label="게시글 메뉴">
            <a class="secondary-button" th:href="@{/}">게시글 목록</a>
            <a class="primary-button" th:href="@{/posts/new}">글쓰기</a>
        </nav>
    </header>

    <article class="post-card">
        <header class="post-heading">
            <span class="post-kicker" th:text="|POST #${post.id}|">POST #1</span>
            <h1 th:text="${post.title}">게시글 제목</h1>

            <div class="post-meta">
                <span class="post-author" th:text="${post.poster}">작성자</span>
                <span class="withdrawn-badge"
                      th:if="${post.member != null and post.member.withdrawn}">탈퇴 회원</span>
                <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-01-01 12:00</span>
                <span th:text="|조회수 ${post.viewCount}|">조회수 0</span>
            </div>
        </header>

        <div class="article-content" th:utext="${post.content}">게시글 내용</div>

        <div class="post-controls">
            <a class="secondary-button" th:href="@{/}">목록으로</a>

            <div class="owner-controls"
                 th:if="${post.member != null and loginMember != null and post.member.id == loginMember.id}">
                <form th:action="@{/posts/{id}/edit(id=${post.id})}" method="post">
                    <button class="secondary-button" type="submit">수정</button>
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">
                </form>

                <form th:action="@{/posts/{id}(id=${post.id})}" method="post">
                    <input type="hidden" name="_method" value="delete">
                    <button class="danger-button" type="submit">삭제</button>
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">
                </form>
            </div>

            <div class="guest-controls" th:if="${post.member == null}">
                <div class="guest-action-forms">
                    <form class="compact-action-form"
                          th:action="@{/posts/{id}/edit(id=${post.id})}"
                          method="post">
                        <label class="sr-only" for="guest-edit-password">수정 비밀번호</label>
                        <input id="guest-edit-password"
                               type="password"
                               name="password"
                               placeholder="수정 비밀번호"
                               autocomplete="current-password">
                        <button class="secondary-button" type="submit">수정</button>
                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}">
                    </form>

                    <form class="compact-action-form"
                          th:action="@{/posts/{id}(id=${post.id})}"
                          method="post">
                        <input type="hidden" name="_method" value="delete">
                        <label class="sr-only" for="guest-delete-password">삭제 비밀번호</label>
                        <input id="guest-delete-password"
                               type="password"
                               name="password"
                               placeholder="삭제 비밀번호"
                               autocomplete="current-password">
                        <button class="danger-button" type="submit">삭제</button>
                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}">
                    </form>
                </div>

                <p class="action-error"
                   th:if="${errorMessage != null}"
                   th:text="${errorMessage}">게시글 처리 오류</p>
            </div>
        </div>
    </article>

    <section class="comment-card" aria-labelledby="comment-title">
        <div class="comment-heading">
            <div>
                <span class="comment-kicker">COMMENTS</span>
                <h2 id="comment-title">댓글</h2>
            </div>
            <span class="comment-count" th:text="|${#lists.size(post.comments)}개|">0개</span>
        </div>

        <p class="comment-message comment-message-error"
           th:if="${commentError != null}"
           th:text="${commentError}">댓글 삭제 오류</p>
        <p class="comment-message comment-message-error"
           th:if="${commentErrorMessage != null}"
           th:text="${commentErrorMessage}">댓글 등록 오류</p>

        <div class="comment-list">
            <p class="comment-empty" th:if="${#lists.isEmpty(post.comments)}">첫 번째 댓글을 남겨보세요.</p>

            <article class="comment-row" th:each="comment : ${post.comments}">
                <div class="comment-author">
                    <strong th:text="${comment.commenter}">작성자</strong>
                    <span class="withdrawn-badge"
                          th:if="${comment.member != null and comment.member.withdrawn}">탈퇴</span>
                </div>

                <p class="comment-content" th:text="${comment.commentContent}">댓글 내용</p>

                <form class="comment-delete-form"
                      th:action="@{/posts/{postId}/comments/{commentId}(postId=${post.id}, commentId=${comment.id})}"
                      method="post">
                    <input type="hidden" name="_method" value="delete">
                    <label class="sr-only"
                           th:if="${comment.member == null}"
                           th:for="|comment-password-${comment.id}|">댓글 비밀번호</label>
                    <input class="comment-password-input"
                           th:if="${comment.member == null}"
                           th:id="|comment-password-${comment.id}|"
                           type="password"
                           name="guestRawPassword"
                           placeholder="비밀번호"
                           autocomplete="current-password">
                    <button class="text-danger-button" type="submit">삭제</button>
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">
                </form>
            </article>
        </div>

        <form class="comment-form"
              th:action="@{/posts/{id}/comments(id=${post.id})}"
              method="post">
            <label class="comment-writer" for="commenter" th:if="${loginMember == null}">
                <span class="sr-only">작성자</span>
                <input id="commenter" name="commenter" placeholder="작성자">
            </label>

            <div class="comment-writer comment-member" th:if="${loginMember != null}">
                <span th:text="|${loginMember.nickname} 님|">회원 님</span>
            </div>

            <label class="comment-body" for="comment-content">
                <span class="sr-only">댓글 내용</span>
                <textarea id="comment-content"
                          name="commentContent"
                          rows="3"
                          placeholder="댓글을 입력하세요"></textarea>
            </label>

            <label class="comment-password" for="comment-password" th:if="${loginMember == null}">
                <span class="sr-only">비밀번호</span>
                <input id="comment-password"
                       type="password"
                       name="guestRawPassword"
                       placeholder="비밀번호"
                       autocomplete="new-password">
            </label>

            <button class="primary-button comment-submit" type="submit">댓글 등록</button>

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">
        </form>
    </section>
</main>
</body>
</html>
