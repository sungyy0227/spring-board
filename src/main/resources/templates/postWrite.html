<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시물 작성 | Spring Board</title>
    <link rel="stylesheet" th:href="@{/css/postWrite.css}">
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>
<body class="write-page">
<main class="write-shell">
    <header class="write-header">
        <a class="write-brand" th:href="@{/}" aria-label="Spring Board 홈">
            <span class="write-brand-mark" aria-hidden="true"></span>
            <span>Spring Board</span>
        </a>
        <a class="secondary-button" th:href="@{/}">게시글 목록</a>
    </header>

    <section class="write-card" aria-labelledby="write-title">
        <div class="write-heading">
            <span class="write-eyebrow">NEW POST</span>
            <h1 id="write-title">새 글 작성</h1>
            <p>새로운 이야기를 게시판에 공유해 보세요.</p>
        </div>

        <form id="post-form"
              class="write-form"
              th:action="@{/posts}"
              th:object="${postDto}"
              method="post"
              enctype="multipart/form-data">
            <label class="write-field" for="post-title">
                <span>제목</span>
                <input id="post-title"
                       type="text"
                       th:field="*{title}"
                       placeholder="제목을 입력하세요">
            </label>
            <div class="field-error"
                 th:if="${#fields.hasErrors('title')}"
                 th:errors="*{title}">제목 오류</div>

            <div class="write-meta">
                <label class="write-field" for="post-writer" th:if="${loginMember == null}">
                    <span>작성자</span>
                    <input id="post-writer"
                           type="text"
                           th:field="*{poster}"
                           placeholder="작성자 이름을 입력하세요">
                </label>

                <div class="write-field" th:if="${loginMember != null}">
                    <span>작성자</span>
                    <div class="member-writer" th:text="|${loginMember.nickname} 님|">회원 님</div>
                </div>

                <label class="write-field" for="guest-password" th:if="${loginMember == null}">
                    <span>비밀번호</span>
                    <input id="guest-password"
                           type="password"
                           th:field="*{guestPassword}"
                           placeholder="수정·삭제에 사용할 비밀번호"
                           autocomplete="new-password">
                </label>
            </div>

            <div class="editor-field">
                <span>내용</span>
                <div id="editor"></div>
                <textarea id="content" th:field="*{content}" hidden></textarea>
            </div>
            <div class="field-error"
                 th:if="${#fields.hasErrors('content')}"
                 th:errors="*{content}">내용 오류</div>

            <p class="write-error"
               th:if="${postErrorMessage}"
               th:text="${postErrorMessage}">게시글 작성 오류</p>

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div class="write-actions">
                <a class="secondary-button" th:href="@{/}">취소</a>
                <button class="primary-button" type="submit">게시글 작성</button>
            </div>
        </form>
    </section>
</main>

<script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
<script th:inline="javascript">
    const contentField = document.querySelector('#content');
    const postForm = document.querySelector('#post-form');
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    const restoredImages = /*[[${uploadedImages}]]*/ null;
    const uploadedImageIds = Array.isArray(restoredImages)
        ? restoredImages.map(image => ({
            id: image.imageId,
            url: image.url
        }))
        : [];

    const editor = new toastui.Editor({
        el: document.querySelector('#editor'),
        height: '500px',
        initialEditType: 'wysiwyg',
        previewStyle: 'vertical',
        initialValue: contentField.value || '',
        usageStatistics: false,
        hooks: {
            addImageBlobHook: async function (blob, callback) {
                const formData = new FormData();
                formData.append('imageFile', blob, blob.name || 'image.png');

                try {
                    const response = await fetch('/editor/images', {
                        method: 'POST',
                        headers: {
                            [csrfHeader]: csrfToken
                        },
                        body: formData
                    });

                    const result = await response.json();

                    if (!response.ok) {
                        alert(result.message || '이미지 업로드에 실패했습니다.');
                        return;
                    }

                    uploadedImageIds.push({
                        id: result.imageId,
                        url: result.url
                    });

                    callback(result.url, blob.name || 'image');
                } catch (error) {
                    console.error('이미지 업로드 오류:', error);
                    alert('이미지 업로드 중 오류가 발생했습니다.');
                }
            }
        }
    });

    postForm.addEventListener('submit', function () {
        const markdown = editor.getMarkdown().trim();
        contentField.value = markdown === '' ? '' : editor.getHTML();

        document.querySelectorAll('input[name="imageIds"]').forEach(input => input.remove());

        uploadedImageIds
            .filter(image => contentField.value.includes(image.url))
            .forEach(image => {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'imageIds';
                input.value = image.id;
                postForm.appendChild(input);
            });
    });
</script>
</body>
</html>
