<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <title>게시물 작성</title>
    <link rel="stylesheet" th:href="@{/css/postWrite.css}">
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>
<body>
<form id="post-form" th:action="@{/posts}" th:object="${postDto}" method="post" enctype="multipart/form-data">
    <table>
        <tr>
            <td>
                <input th:field="*{title}" placeholder="제목입력">
                <div th:if="${#fields.hasErrors('title')}"
                     th:errors="*{title}"
                     style="color:red;"></div>
            </td>
            <td>
                <input th:if="${loginMember == null}" th:field="*{poster}" placeholder="작성자 입력">
                <span th:if="${loginMember != null}" th:text="${loginMember.nickname} + ' 님'"></span>
            </td>
        </tr>
        <tr>
            <td colspan="2">
                <div id="editor"></div>
                <textarea id="content" th:field="*{content}" hidden></textarea>
                <div th:if="${#fields.hasErrors('content')}"
                     th:errors="*{content}"
                     style="color:red;"></div>
            </td>
        </tr>
    </table>

    <p th:if="${postErrorMessage}"
       th:text="${postErrorMessage}"
       style="color:red;"></p>

    <button type="submit">작성</button>
    <input type="password" th:if="${loginMember == null}" th:field="*{guestPassword}" placeholder="비밀번호 입력">
    <input type="hidden"
           th:name="${_csrf.parameterName}"
           th:value="${_csrf.token}">
</form>

<script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
<script>
    const contentField = document.querySelector('#content');
    const postForm = document.querySelector('#post-form');
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    const uploadedImageIds = [];

    const editor = new toastui.Editor({
        el: document.querySelector('#editor'),
        height: '500px',
        initialEditType: 'wysiwyg',
        previewStyle: 'vertical',
        initialValue: contentField.value || '',
        usageStatistics: false,
        hooks: {
            addImageBlobHook: async function (blob, callback) {
                const formData = new FormData();
                formData.append('imageFile', blob, blob.name || 'image.png');

                const response = await fetch('/editor/images', {
                    method: 'POST',
                    headers: {
                        [csrfHeader]: csrfToken
                    },
                    body: formData
                });

                if (!response.ok) {
                    alert('이미지 업로드에 실패했습니다.');
                    return;
                }

                const result = await response.json();
                uploadedImageIds.push({
                    id: result.imageId,
                    url: result.url
                });

                callback(result.url, blob.name || 'image');
            }
        }
    });

    postForm.addEventListener('submit', function () {
        const markdown = editor.getMarkdown().trim();
        contentField.value = markdown === '' ? '' : editor.getHTML();

        document.querySelectorAll('input[name="imageIds"]').forEach(input => input.remove());

        uploadedImageIds
            .filter(image => contentField.value.includes(image.url))
            .forEach(image => {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'imageIds';
                input.value = image.id;
                postForm.appendChild(input);
            });
    });
</script>
</body>
</html>
