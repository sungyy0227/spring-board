<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<link rel="stylesheet" th:href="@{/css/login.css}">
<head>
    <title>회원가입</title>
</head>
<body>
<form th:action="@{/login/signup}" th:object="${memberDto}" method="post">
    <input type="text" th:field="*{loginId}" placeholder="아이디">
    <div th:each="error : ${validationErrors}"
         th:if="${error.fieldName == 'loginId'}"
         th:text="${error.errorMessage}"
         style="color:red;"></div>
    <br>

    <input type="password" name="password" placeholder="비밀번호">
    <div th:each="error : ${validationErrors}"
         th:if="${error.fieldName == 'password'}"
         th:text="${error.errorMessage}"
         style="color:red;"></div>
    <br>

    <input type="text" th:field="*{nickname}" placeholder="닉네임">
    <div th:each="error : ${validationErrors}"
         th:if="${error.fieldName == 'nickname'}"
         th:text="${error.errorMessage}"
         style="color:red;"></div>
    <br>

    <button type="submit">회원가입</button>
    <input type="hidden"
           th:name="${_csrf.parameterName}"
           th:value="${_csrf.token}">
</form>
<div th:if="${errorMessage}" th:text="${errorMessage}" style="color:red;"></div>
</body>
</html>
