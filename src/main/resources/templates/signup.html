<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<link rel="stylesheet" th:href="@{/css/login.css}">
<head>
    <title>회원가입</title>
</head>
<body>
<form th:action="@{/login/signup}" th:object="${memberdto}" method="post">
    <input type="text" name="loginId" placeholder="아이디"><br><br>
    <input type="password" name="password" placeholder="비밀번호"><br><br>
    <input type="text" name="nickname" placeholder="닉네임"><br>
    <button type="submit">회원가입</button>
</form>
</body>
</html>
