<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 | Spring Board</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body class="auth-page">
<main class="auth-shell">
    <a class="auth-brand" th:href="@{/}" aria-label="Spring Board 홈">
        <span class="auth-brand-mark" aria-hidden="true"></span>
        <span>Spring Board</span>
    </a>

    <section class="auth-card" aria-labelledby="signup-title">
        <div class="auth-heading">
            <span class="auth-eyebrow">CREATE ACCOUNT</span>
            <h1 id="signup-title">회원가입</h1>
            <p>간단한 정보로 계정을 만들고 게시판에 참여해 보세요.</p>
        </div>

        <div class="auth-alert auth-alert-error"
             th:if="${errorMessage}"
             th:text="${errorMessage}">회원가입 오류</div>

        <form class="auth-form" th:action="@{/login/signup}" th:object="${signupForm}" method="post">
            <label class="form-field" for="signup-login-id">
                <span>아이디</span>
                <input id="signup-login-id"
                       type="text"
                       th:field="*{loginId}"
                       placeholder="영문·숫자 5~20자"
                       autocomplete="username">
            </label>
            <div class="field-error"
                 th:each="error : ${validationErrors}"
                 th:if="${error.fieldName == 'loginId'}"
                 th:text="${error.errorMessage}">아이디 오류</div>

            <label class="form-field" for="signup-password">
                <span>비밀번호</span>
                <input id="signup-password"
                       type="password"
                       name="password"
                       placeholder="영문·숫자 6~20자"
                       autocomplete="new-password">
            </label>
            <div class="field-error"
                 th:each="error : ${validationErrors}"
                 th:if="${error.fieldName == 'password'}"
                 th:text="${error.errorMessage}">비밀번호 오류</div>

            <label class="form-field" for="signup-nickname">
                <span>닉네임</span>
                <input id="signup-nickname"
                       type="text"
                       th:field="*{nickname}"
                       placeholder="한글·영문·숫자·_ 2~12자"
                       autocomplete="nickname">
            </label>
            <div class="field-error"
                 th:each="error : ${validationErrors}"
                 th:if="${error.fieldName == 'nickname'}"
                 th:text="${error.errorMessage}">닉네임 오류</div>

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <button class="auth-primary-button" type="submit">회원가입</button>
        </form>

        <p class="auth-switch">
            이미 계정이 있으신가요?
            <a th:href="@{/login}">로그인</a>
        </p>
    </section>
</main>
</body>
</html>
