<html xmlns:th="http://www.thymeleaft.org" lang="ko">
<link rel="stylesheet" th:href="@{/css/main.css}">
<head>
<title>메인</title>
</head>
<body>
<div class="menu">
    <form th:action="@{/write}" method="get">
        <button type="submit">글작성</button>
    </form>

    <div class="right-menu">

        <div th:if="${loginMember == null}">
            <form th:action="@{/login}" method="get">
                <button>로그인</button>
            </form>
        </div>

        <div th:if="${loginMember != null}">
            <span th:text="${loginMember.nickname} + ' 님'"></span>

            <div th:if="${loginMember.isAdmin()}">
                <form th:action="@{/admin}"><button>관리자페이지</button></form>
            </div>
            <form th:action="@{/mypage}" method="get">
                <button>마이페이지</button>
            </form>
            <form th:action="@{/logout}" method="post">
                <button>로그아웃</button>
            </form>
        </div>

    </div>
</div>
<table>
    <colgroup>
        <col style="width: 10%;">
        <col style="width: 50%;">
        <col style="width: 15%;">
        <col style="width: 15%;">
        <col style="width: 10%;">
    </colgroup>
    <thead>
        <tr>
            <th scope="col">번호</th>
            <th scope="col">제목</th>
            <th scope="col">작성자</th>
            <th scope="col">날짜</th>
            <th scope="col">조회수</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="post : ${posts}">
            <td th:text="${post.id}"></td>
            <td>
            <a th:href="@{/post/{id}(id=${post.id})}"
               th:text="${post.title}">제목</a>
            </td>
            <td th:text="${post.poster}"></td>
            <td th:text="${#temporals.format(post.createdAt, 'MM-dd HH:mm')}"></td>
            <td th:text="${post.viewCount}"></td>
        </tr>
    <tr>
        <td colspan="4"><div class="pagination" th:if="${postPage.totalPages > 0}">

            <!-- 왼쪽 화살표 -->
            <a class="pageButton"
               th:if="${startPage > 1}"
               th:href="@{/(page=${startPage - 1})}">
                <button type="button">&lt;</button>
            </a>

            <!-- 페이지 번호 -->
            <a class="pageButton"
               th:each="pageNum : ${#numbers.sequence(startPage, endPage)}"
               th:href="@{/(page=${pageNum})}">
                <button type="button"
                        th:text="${pageNum}">
                </button>
            </a>

            <!-- 오른쪽 화살표 -->
            <a class="pageButton"
               th:if="${endPage < postPage.totalPages}"
               th:href="@{/(page=${endPage + 1})}">
                <button type="button">&gt;</button>
            </a>

        </div></td>
    </tr>
    </tbody>
</table>
</body>
</html>
