<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>마이페이지</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            width: 1000px;
            margin: 30px auto;
            background-color: #f8f9fa;
        }

        h1, h2 {
            color: #333;
        }

        .section {
            background: white;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #f1f3f5;
        }

        a {
            text-decoration: none;
            color: #0077cc;
        }

        a:hover {
            text-decoration: underline;
        }

        .empty-message {
            margin-top: 10px;
            color: #888;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 16px;
            background-color: #343a40;
            color: white;
            border-radius: 6px;
        }

        .back-btn:hover {
            background-color: #495057;
            text-decoration: none;
        }

        .role-form {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .role-btn {
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            color: white;
            font-size: 14px;
        }

        .user-btn {
            background-color: #6c757d;
        }

        .admin-btn {
            background-color: #007bff;
        }

        .role-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<h1>마이페이지</h1>

<div class="section">
    <h2>회원 정보</h2>
    <table>
        <tr>
            <th>로그인 아이디</th>
            <td th:text="${member.loginId}"></td>
        </tr>
        <tr>
            <th>닉네임</th>
            <td th:text="${member.nickname}"></td>
        </tr>
    </table>
</div>

<div class="section">
    <h2>작성한 글</h2>

    <div th:if="${#lists.isEmpty(posts)}" class="empty-message">
        작성한 글이 없습니다.
    </div>

    <table th:if="${!#lists.isEmpty(posts)}">
        <thead>
        <tr>
            <th>글 번호</th>
            <th>제목</th>
            <th>조회수</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="post : ${posts}">
            <td th:text="${post.id}"></td>
            <td>
                <a th:href="@{/post/{id}(id=${post.id})}" th:text="${post.title}"></a>
            </td>
            <td th:text="${post.viewCount}"></td>
        </tr>
        </tbody>
    </table>
</div>

<div class="section">
    <h2>작성한 댓글</h2>

    <div th:if="${#lists.isEmpty(comments)}" class="empty-message">
        작성한 댓글이 없습니다.
    </div>

    <table th:if="${!#lists.isEmpty(comments)}">
        <thead>
        <tr>
            <th>댓글 번호</th>
            <th>내용</th>
            <th>작성 글</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="comment : ${comments}">
            <td th:text="${comment.id}"></td>
            <td th:text="${comment.commentContent}"></td>
            <td>
                <a th:href="@{/post/{id}(id=${comment.post.id})}"
                   th:text="${comment.post.title}"></a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
<form th:action="@{/mypage/withdraw}" method="get">
    <button>회원탈퇴</button>
</form>
</html>
