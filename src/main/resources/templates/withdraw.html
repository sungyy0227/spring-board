<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원탈퇴 | Spring Board</title>
    <link rel="stylesheet" th:href="@{/css/account.css}">
</head>
<body class="account-page">
<main class="account-shell account-shell-narrow">
    <header class="account-header">
        <a class="account-brand" th:href="@{/}" aria-label="Spring Board 홈">
            <span class="account-brand-mark" aria-hidden="true"></span>
            <span>Spring Board</span>
        </a>
        <a class="secondary-button" th:href="@{/mypage}">마이페이지</a>
    </header>

    <section class="withdraw-card" aria-labelledby="withdraw-title">
        <div class="withdraw-icon" aria-hidden="true">!</div>
        <span class="danger-eyebrow">ACCOUNT WITHDRAWAL</span>
        <h1 id="withdraw-title">회원탈퇴</h1>
        <p>탈퇴하기 전에 아래 내용을 꼭 확인해 주세요.</p>

        <ul class="withdraw-notice">
            <li>탈퇴한 계정으로는 더 이상 로그인할 수 없습니다.</li>
            <li>작성한 글과 댓글은 탈퇴 후에도 게시판에 유지됩니다.</li>
        </ul>

        <p class="account-alert account-alert-error"
           th:if="${errorMessage != null}"
           th:text="${errorMessage}">비밀번호가 올바르지 않습니다.</p>

        <form class="withdraw-form" th:action="@{/mypage/withdraw}" method="post">
            <label for="withdraw-password">비밀번호 확인</label>
            <input id="withdraw-password"
                   type="password"
                   name="password"
                   placeholder="현재 비밀번호를 입력하세요"
                   autocomplete="current-password">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div class="withdraw-actions">
                <a class="secondary-button" th:href="@{/mypage}">취소</a>
                <button class="danger-button" type="submit">회원탈퇴</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
